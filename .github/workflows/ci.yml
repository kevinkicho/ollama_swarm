# #307 (2026-04-28): CI gate. Type-check + server unit-test suite on every
# push and PR. Phase 5 (2026-07-09): matrix ubuntu + windows for path/kill
# regressions.
#
# IMPORTANT FOR RELIABILITY:
#   Run `npm run verify-ci` (or the exact steps below) locally before every push.
#   This script lives in scripts/verify-ci.mjs and mirrors this workflow 1:1.
#   Common footguns that still break CI:
#     * New .ts/.tsx files that were never `git add`ed (→ "Cannot find module")
#     * Moving code without updating *Runner.test.ts greps
#     * Adding implicit `any` parameters
#   The verify script also fails fast on untracked *.ts *.tsx.
#
# Tests run with OPENCODE_SERVER_PASSWORD=test-only because the
# zod config schema in server/src/config.ts requires the env var to
# be set at module-load.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Type-check + tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type-check (server + web + shared)
        run: npm run typecheck

      - name: Run test suite (shared + server)
        env:
          OPENCODE_SERVER_PASSWORD: test-only
        run: npm test

      - name: Verify BlackboardRunner field discovery is current
        run: npx tsx server/scripts/discover-runner-fields.ts --check

      - name: Verify prompt assertions (drift check)
        run: npx tsx eval/drift-check.ts

      - name: Verify production build succeeds
        run: npm run build

      - name: Electron stub test (prior data + flags)
        run: node electron/test-stub.cjs

      - name: Eval score + preset coverage gates
        run: node --test eval/score-run.test.mjs eval/preset-coverage.test.mjs
