# #307 (2026-04-28): minimal CI gate. Runs the type-check + the
# server unit-test suite on every push and PR. Catches regressions
# the local dev loop misses (e.g. when tsx watch on /mnt/c silently
# reloads stale code, or when a subtle import path break only
# surfaces in a fresh checkout).
#
# IMPORTANT FOR RELIABILITY:
#   Run `npm run verify-ci` (or the exact steps below) locally before every push.
#   This script lives in scripts/verify-ci.mjs and mirrors this workflow 1:1.
#   Common footguns that still break CI:
#     * New .ts/.tsx files that were never `git add`ed (→ "Cannot find module")
#     * Moving code (SetupForm → hooks/presets, etc.) without updating all
#       fs.readFileSync greps in *Runner.test.ts files
#     * Adding implicit `any` parameters on callbacks or new Brain/pipeline cfg
#   The verify script now also fails fast on untracked *.ts *.tsx.
#
# Tests run with OPENCODE_SERVER_PASSWORD=test-only because the
# zod config schema in server/src/config.ts requires the env var to
# be set at module-load (see reference_test_command_password.md
# memory entry).
#
# Web side: type-check only — no UI runtime tests in the suite yet.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Type-check + server tests
    runs-on: ubuntu-latest
    # 40 min budget. Locally the suite runs in ~12s with 1100+ tests.
    # On CI we disable per-file process isolation (CI=true triggers
    # --test-isolation=none in run-tests.mjs) because 70 cold node
    # spawns × CI's slow disk = 25+ min, and our tests don't share
    # global state (each uses its own tmpdir + fresh adapters). With
    # isolation disabled, CI should land in ~3-5 min.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          # Use 24.x in CI to get stable --test-isolation=none flag
          # (was experimental in 22.x). Locally Kevin runs 25.x; both
          # support the flag we use in CI mode for a 5x speedup over
          # process isolation.
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type-check (server + web + shared)
        run: npm run typecheck

      - name: Run test suite (shared + server)
        env:
          OPENCODE_SERVER_PASSWORD: test-only
        run: npm test

      - name: Verify BlackboardRunner field discovery is current
        run: npx tsx server/scripts/discover-runner-fields.ts --check

      - name: Verify prompt assertions (drift check)
        run: npx tsx eval/drift-check.ts

      - name: Verify production build succeeds
        run: npm run build

      - name: Electron stub test (prior data + flags)
        run: node electron/test-stub.cjs
